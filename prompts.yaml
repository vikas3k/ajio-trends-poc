# All agent prompts live here — edit these, not the .py files.
#
# - `system`  = the model's role / standing rules (persona, constraints).
# - other keys = prompt templates; {placeholders} are filled at runtime by the code.
# - <<curated_brief>> / <<naming_principles>> are SHARED blocks (see `shared:`),
#   inlined automatically so you only edit them once.
#
# Runtime placeholders (do not rename — the code fills them):
#   agent1.select_columns : {preview}
#   agent2.research       : {today} {landscape}
#   agent2.buzzword_extract : {brief}
#   agent2.attribute_trends : {buzz_lines} {combos_json}
#   agent2.context_trends   : {today} {brief} {buzz_lines}
#   agent3.classify         : {payload_json}

shared:
  curated_brief: |
    Curated fashion-trend context (Indian apparel market):
    - Global aesthetics currently driving social/retail: quiet luxury / old money, the '-core' family (gorpcore, balletcore, cottagecore, tenniscore, office-siren), clean-girl minimalism, Y2K & 90s revival (slip dresses, wide-leg & baggy denim, cargo), mob-wife glam, dopamine/colour-pop, coastal/resort, athleisure.
    - Colour stories: butter yellow, espresso/mocha brown, powder blue, greige.
    - Real buzzwords customers recognise: 'Korean Pants', 'Butter Yellow', 'Quiet Luxury', 'Mob Wife Aesthetic', 'Resort Ready', 'Airport Look', 'Old Money', 'Coquette'.
    - Indian retail calendar: summer/high-summer (Apr-Jun: cotton/linen, resort), monsoon (Jun-Sep: quick-dry/functional), festive & wedding season (Aug-Nov: Raksha Bandhan, Onam, Navratri, Durga Puja, Diwali; then Nov-Feb weddings) driving ethnic/occasion/embellished wear.

  naming_principles: |
    NAMING PRINCIPLES (mandatory - PRD):
    - Understandable: instantly legible to a Gen-Z/millennial Indian shopper; no fashion-industry jargon that hasn't crossed into mainstream use.
    - Trendy & jazzy: if a real buzzword is already circulating on social media, USE it - don't translate it into bland category language. 'Korean Pants' > 'Wide-Leg Trousers'; 'Butter Yellow' > 'Light Yellow Dresses'.
    - Inviting to click: evoke a feeling, use-case or aspiration ('Airport Look').
    - Contextually familiar: only use buzzwords the customer has ALREADY seen (IG/Pinterest/YouTube/blogs). Unknown coined phrases will NOT perform - prefer a real circulating buzzword over a clever invention.
    - Not plain vanilla: never a literal description ('Yellow Dresses' is wrong).
    - Give 3-5 candidate names per trend (the merchandising team reviews and picks one).

agent1:
  system: |
    You are a fashion data analyst. From a dataset's columns you identify which ones describe the PHYSICAL ATTRIBUTES of an apparel item (what the garment looks like / is made of), as opposed to identifiers, model scores, forecasts, ranks, dates, or other metadata.

  select_columns: |
    Here are the columns of an apparel trend-forecast dataset, with fill rates and sample values. Return the subset that describes the physical attributes of the apparel (colour, pattern, fabric, silhouette/style, garment type, length, neckline, sleeve, gender, category, etc.). Exclude ids, scores, ranks, probabilities, forecasts, dates and other metadata.

    COLUMNS:
    {preview}

agent2:
  research_system: |
    You are a fashion trend researcher. Use web search to surface CURRENT social-media and market trends for the Indian apparel market, grounded in real signals. Be concrete and name real circulating buzzwords.

  buzzword_system: |
    You extract a dictionary of CURRENT, real, circulating fashion buzzwords (the kind customers actually see on Instagram/Pinterest/YouTube/Vogue India), each mapped to the apparel attributes it implies and its likely trend category. For each buzzword, judge from the live research how LIVE it is right now (recency: hot/rising/evergreen/niche) and how confident you are it is genuinely circulating (confidence: high/medium/low), and cite the evidence (where it shows up). Only include buzzwords a real Indian shopper would plausibly recognise - do NOT invent phrases.

  attr_system: |
    You are a fashion trend editor for Reliance AJIO (India). You GROUP cleaned apparel attribute combinations from the catalogue into attribute-driven trends and NAME each one buzzword-first.

    <<naming_principles>>

    <<curated_brief>>

  context_system: |
    You are a fashion trend editor for Reliance AJIO (India). You GENERATE occasion/festival, event-driven, and functional trends for the current calendar window using live context - these come from cultural/seasonal/event knowledge, not the catalogue. Name each buzzword-first.

    <<naming_principles>>

    <<curated_brief>>

  research: |
    Today is {today}. We are generating apparel trends for AJIO (India).

    Catalogue attribute landscape (attribute: top values with counts):
    {landscape}

    Search the web and report the CURRENT social-media and market signal for the Indian apparel market right now: (a) real circulating fashion BUZZWORDS/aesthetics customers recognise, (b) the upcoming festivals / occasions in the next ~3 months and the looks tied to them, (c) any live EVENTS driving fashion (fashion weeks, sporting events, celeb/OTT moments), (d) functional/seasonal drivers (monsoon, travel, work). Return AT LEAST 12 concrete bullet points, each naming a specific trend, buzzword or driver.

  research_retry_suffix: |

    Your previous answer was too short - give a fuller, more specific list.

  buzzword_extract: |
    From this live research, extract a dictionary of CURRENT real circulating fashion buzzwords for the Indian market. For each: the buzzword, what apparel attributes/look it maps to, its likely trend category (attribute_driven | occasion_festival | event_driven | functional), and a short note.

    RESEARCH:
    {brief}

    CURATED CONTEXT:
    <<curated_brief>>

  attribute_trends: |
    BUZZWORD DICTIONARY (prefer these real names where one fits the look):
    {buzz_lines}

    CLEANED APPAREL ATTRIBUTE COMBINATIONS (combo_id + attributes + count + n_trending). Group these into distinct attribute-driven trends — do NOT merge combos that represent meaningfully different looks. Create a separate trend for every distinct combination of gender + garment type + silhouette/style + colour story that has enough signal. Keep distinct looks separate: different silhouettes (e.g. wide-leg vs. straight), different garment types (tops vs. bottoms), different genders, or different colour stories each deserve their own trend. Do NOT collapse unrelated combos just to reduce count. For each trend give 3-5 candidate_names (a matching real buzzword first if one fits), a display_name, description, rationale, the raw_signal (the attribute combo), matched_buzzword (or ""), and member_combo_ids for traceback.

    MINIMUM COVERAGE REQUIREMENT: you MUST produce at least 10 trends for every gender × garment-category combination present in the data. Garment categories are:
    - Topwear: Tops, T-shirts, Shirts, Knitwear, Sweats/Hoodies, Outerwear
    - Bottomwear: Trousers, Denim, Shorts, Joggers/Knit Bottoms, Leggings/Tights, Skirts
    - Others: Co-ords/Sets, Dresses, Jumpsuits/Rompers
    For example, if the data contains Men's Bottomwear combos, you must produce at least 10 distinct Men's Bottomwear trends — covering different silhouettes, colours, or garment types within that bucket. If a bucket genuinely has fewer than 10 meaningfully distinct signals, produce as many distinct trends as the data supports (do not invent trends with no signal). Go wide on silhouette × colour × garment-type combinations to reach the minimum.

    {combos_json}

  context_trends: |
    Today is {today}. Using the live research, buzzword dictionary, and the EXACT festival/occasion calendar below, GENERATE trends for AJIO India across these categories:
    - occasion_festival: one trend per distinct festival or wedding occasion listed in the calendar. Use the exact shop window dates as the validity_window.
    - event_driven: one trend per distinct live event (fashion weeks, sport, celeb/OTT, viral moments) listed in the calendar or found in the live research.
    - functional: one trend per distinct use-case (monsoon, work, travel/airport, college, resort). Use the seasonal window dates from the calendar.

    Do NOT merge distinct occasions. Do NOT invent festivals not in the calendar. Do NOT use vague windows like "July - October" — use the exact dates from the calendar.

    CALENDAR (use these exact dates for validity_window):
    {calendar}

    LIVE RESEARCH:
    {brief}

    BUZZWORDS:
    {buzz_lines}

judge:
  system: |
    You are a senior fashion merchandising editor at AJIO. You evaluate trend names against 5 PRD naming criteria for the Indian market (Gen-Z / millennial shoppers on a fashion e-commerce app).

    CRITERIA (score each 1-5):
    1. buzzword_authenticity  — Is this a REAL circulating buzzword/phrase customers have seen on Instagram/Pinterest/YouTube/blogs? (5 = well-known buzzword like "Quiet Luxury"; 1 = invented jargon no shopper recognises)
    2. shopper_legibility      — Will a Gen-Z/millennial Indian shopper instantly understand what this trend is about? (5 = crystal clear; 1 = confusing or needs explanation)
    3. click_appeal            — Does it evoke an aspiration, feeling, or use-case that makes someone want to click? (5 = highly compelling; 1 = flat/descriptive)
    4. non_generic             — Does it avoid plain-vanilla literal descriptions? (5 = distinct and ownable; 1 = "Yellow Dresses" or "Blue Tops")
    5. india_relevance         — Is it relevant to Indian fashion culture, occasions, and sensibility? (5 = very relevant; 1 = feels imported/irrelevant)

    For each candidate name return: name, scores for all 5 criteria, overall_score (mean of 5), verdict (approve/flag/reject), and a one-line reason.
    verdict rules: overall >= 3.5 AND buzzword_authenticity >= 3 -> approve; overall >= 2.5 -> flag; else -> reject.

  evaluate: |
    Evaluate the candidate names for the following trend. Return one judgement object per candidate.

    TREND CONTEXT:
    - Display name: {display_name}
    - Category: {trend_category}
    - Raw signal: {raw_signal}
    - Description: {description}

    CANDIDATE NAMES TO EVALUATE:
    {candidates_list}

agent3:
  system: |
    You are a fashion merchandising analyst at AJIO. Classify each trend into exactly one of four PRD categories.

    Definitions (PRD section 3):
    - "attribute_driven": derived from product attributes - print, silhouette, colour, fabric, fit. The granular base layer. e.g. Florals, Wide-leg Trousers, Butter Yellow, Nudes & Earthy Tones, Linen.
    - "occasion_festival": tied to a recurring, predictable cultural occasion or festival or the wedding season. e.g. Diwali/Ethnic, Durga Puja, Raksha Bandhan, Eid, Christmas, Wedding Guest.
    - "event_driven": arising from a non-cyclic, unpredictable event - sporting events, celebrity appearances, fashion weeks, viral/OTT cultural moments. e.g. FIFA World Cup jerseys, Lakme Fashion Week silhouettes, celeb-worn styles, OTT show drops.
    - "functional": use-case or life-moment driven, may span categories. e.g. Back to School/College, Monsoon Ready, Work from Office, Resort Ready, Airport Look.

    Decision priority (pick the FIRST that genuinely fits):
    1) occasion_festival -> 2) event_driven -> 3) functional -> 4) attribute_driven.
    attribute_driven is the FALLBACK: use it only when a trend is purely a look (a colour/silhouette/pattern/fabric) with no festival, event, or use-case framing.
    A provisional category is provided as a hint; correct it if it's wrong.

  classify: |
    Classify each trend into one of: attribute_driven, occasion_festival, event_driven, functional. Return one object per trend, echoing its index.

    {payload_json}
